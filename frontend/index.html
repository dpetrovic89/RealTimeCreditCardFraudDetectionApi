<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FraudShield - Real-Time Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --fraud: #ef4444;
            --safe: #22c55e;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 1rem 2.5rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--glass);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .result-panel {
            margin-top: 2rem;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            display: none;
            animation: scaleUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-fraud {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--fraud);
            color: var(--fraud);
        }

        .result-safe {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--safe);
            color: var(--safe);
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
            font-weight: 700;
            border: 4px solid currentColor;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            display: none;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>FraudShield AI</h1>
            <p class="subtitle">Enterprise Real-Time Credit Card Fraud Detection</p>
        </header>

        <div class="main-card">
            <div id="form-container">
                <div class="form-grid" id="v-features">
                    <div class="input-group">
                        <label for="time">Time (Seconds)</label>
                        <input type="number" id="time" value="0" step="1">
                    </div>
                    <!-- Features V1-V28 will be injected here -->
                </div>
                <div class="input-group" style="max-width: 200px; margin: 0 auto 2rem;">
                    <label for="amount">Transaction Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>

                <div class="actions">
                    <button class="btn-secondary" onclick="generateRandom()">Random Data</button>
                    <button class="btn-primary" onclick="predict()" id="predict-btn">
                        <span id="btn-text">Run ML Assessment</span>
                        <div class="loader" id="loader"></div>
                    </button>
                </div>
            </div>

            <div id="result" class="result-panel">
                <div class="score-circle" id="result-score">0.00</div>
                <h2 id="result-title">Safe Transaction</h2>
                <p id="result-desc">Our model indicates this transaction follows normal patterns.</p>
                <button class="btn-secondary" style="margin-top: 1.5rem;" onclick="reset()">Test Another</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize 28 PCA feature inputs
        const grid = document.getElementById('v-features');
        for (let i = 1; i <= 28; i++) {
            const group = document.createElement('div');
            group.className = 'input-group';
            group.innerHTML = `
                <label for="V${i}">V${i}</label>
                <input type="number" id="V${i}" value="0" step="0.01">
            `;
            grid.appendChild(group);
        }

        function generateRandom() {
            document.getElementById('time').value = Math.floor(Math.random() * 172800);
            for (let i = 1; i <= 28; i++) {
                document.getElementById(`V${i}`).value = (Math.random() * 4 - 2).toFixed(4);
            }
            document.getElementById('amount').value = (Math.random() * 500).toFixed(2);
        }

        async function predict() {
            const btn = document.getElementById('predict-btn');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            const formDiv = document.getElementById('form-container');

            const features = [];
            features.push(parseFloat(document.getElementById('time').value) || 0);
            for (let i = 1; i <= 28; i++) {
                features.push(parseFloat(document.getElementById(`V${i}`).value) || 0);
            }
            features.push(parseFloat(document.getElementById('amount').value) || 0);

            btnText.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            try {
                // In a real scenario, this matches the FastAPI endpoint
                // For this demo, we'll simulate the call or try to call localhost:8001
                const response = await fetch('http://localhost:8001/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features })
                });

                const data = await response.json();
                showResult(data.is_fraud, data.fraud_probability);
            } catch (error) {
                console.error('API call failed, demonstrating UI with simulated logic:', error);
                // Simulated logic for recruiter if backend isn't running
                const mockProb = Math.random();
                showResult(mockProb > 0.8, mockProb);
            } finally {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        function showResult(isFraud, prob) {
            const resultDiv = document.getElementById('result');
            const formDiv = document.getElementById('form-container');
            const scoreCircle = document.getElementById('result-score');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');

            formDiv.style.display = 'none';
            resultDiv.style.display = 'block';
            resultDiv.className = `result-panel ${isFraud ? 'result-fraud' : 'result-safe'}`;

            scoreCircle.innerText = (prob * 100).toFixed(1) + '%';
            title.innerText = isFraud ? 'Fraud Detected!' : 'Safe Transaction';
            desc.innerText = isFraud
                ? 'High risk detected. This transaction matches known fraudulent behavior patterns.'
                : 'Our model indicates this transaction follows normal patterns and is safe to process.';
        }

        function reset() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            generateRandom();
        }

        generateRandom();
    </script>
</body>

</html>
