name: Fraud Detection CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Prepare Data
      run: |
        mkdir -p data
        python scripts/generate_data.py
    - name: Run Data Validation
      run: python scripts/data_validation.py
    - name: Smoke Test (API)
      run: |
        python -c "from src.app import app; print('App loaded successfully')"

  deploy-to-huggingface:
    needs: test-and-validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Push to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git push --force https://dpetrovic89:$HF_TOKEN@huggingface.co/spaces/dpetrovic89/RealTimeCreditCardFraudDetectionApi main
